name: sast
 
on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"

jobs:
  semgrep:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: ${{ inputs.python-version }}

        - name: Install Semgrep
          run: python -m pip install --upgrade semgrep

        - name: Run Semgrep (fail on invalid rules)
          run: semgrep --config .semgrep.yml --error --strict