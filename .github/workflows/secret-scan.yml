name: secret-scan

on:
  workflow_call:
    inputs:
      mode:
        description: 'Scan mode: incremental or full'
        required: true
        type: string

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (incremental)
        if: inputs.mode == 'incremental'
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

      - name: Run TruffleHog (full)
        if: inputs.mode == 'full'
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: .
          extra_args: --only-verified