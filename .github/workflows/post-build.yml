name: post-build

on:
  workflow_call:
    inputs:
      sign_matrix:
        required: true
        type: string
        description: "JSON matrix of services to sign (dynamic, from detect-changes)"
      sbom_format:
        required: false
        type: string
        default: "spdx-json"
        description: "SBOM output format: spdx-json | cyclonedx-json | syft-json"

permissions:
  contents: read

jobs:
  sign-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.sign_matrix) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign ${{ matrix.service }} image (keyless OIDC)
        run: cosign sign --yes ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

  generate-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - api-service
          - products-service
          - inventory-service
          - frontend-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Check if image exists in GHCR
        id: image-check
        run: |
          IMAGE="ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true"  >> $GITHUB_OUTPUT
          else
            echo "Image $IMAGE not found in GHCR — skipping SBOM"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Pull ${{ matrix.service }} image
        if: steps.image-check.outputs.exists == 'true'
        run: docker pull ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

      - name: Generate SBOM for ${{ matrix.service }}
        if: steps.image-check.outputs.exists == 'true'
        uses: anchore/sbom-action@v0.16.0
        with:
          image: ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci
          format: ${{ inputs.sbom_format }}
          output-file: ${{ matrix.service }}-sbom.spdx.json

      - name: Upload SBOM artifact
        if: steps.image-check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: ${{ matrix.service }}-sbom.spdx.json
          if-no-files-found: warn