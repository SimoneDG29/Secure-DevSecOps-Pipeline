name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install auth-service deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/auth-service/requirements.txt -r services/auth-service/requirements-dev.txt

      - name: Install api-service deps
        run: |
          pip install -r services/api-service/requirements.txt -r services/api-service/requirements-dev.txt

      - name: Install products-service deps
        run: |
          pip install -r services/products-service/requirements.txt -r services/products-service/requirements-dev.txt

      - name: Run auth-service tests
        run: pytest services/auth-service/tests

      - name: Run api-service tests
        run: pytest services/api-service/tests

      - name: Run products-service tests
        run: pytest services/products-service/tests

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep (fail on invalid rules)
        run: semgrep --config .semgrep.yml --error --strict

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint infrastructure/helm/secure-pipeline

  build-and-scan-images:
    runs-on: ubuntu-latest
    needs: [lint-test, semgrep, helm-lint]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          load: true
          tags: auth-service:ci

      - name: Build api-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          load: true
          tags: api-service:ci

      - name: Build products-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/products-service
          load: true
          tags: products-service:ci

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan auth-service image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed auth-service:ci

      - name: Scan api-service image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed api-service:ci

      - name: Scan products-service image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed products-service:ci

      - name: Tag images for GHCR
        run: |
          docker tag auth-service:ci ghcr.io/${{ env.OWNER }}/auth-service:ci
          docker tag api-service:ci ghcr.io/${{ env.OWNER }}/api-service:ci
          docker tag products-service:ci ghcr.io/${{ env.OWNER }}/products-service:ci

      - name: Push images to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ env.OWNER }}/auth-service:ci
          docker push ghcr.io/${{ env.OWNER }}/api-service:ci
          docker push ghcr.io/${{ env.OWNER }}/products-service:ci

  sign-images:
    runs-on: ubuntu-latest
    needs: build-and-scan-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign auth-service image (keyless)
        run: cosign sign --yes ghcr.io/${{ env.OWNER }}/auth-service:ci

      - name: Sign api-service image (keyless)
        run: cosign sign --yes ghcr.io/${{ env.OWNER }}/api-service:ci

      - name: Sign products-service image (keyless)
        run: cosign sign --yes ghcr.io/${{ env.OWNER }}/products-service:ci

  create-secrets:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic products-db-secret \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_PORT=${{ secrets.DB_PORT }} \
            --from-literal=DB_NAME=${{ secrets.DB_NAME }} \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

  deploy:
    runs-on: ubuntu-latest
    needs: [helm-lint, create-secrets]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install secure-pipeline infrastructure/helm/secure-pipeline \
            --set authService.image.repository=ghcr.io/${{ env.OWNER }}/auth-service \
            --set apiService.image.repository=ghcr.io/${{ env.OWNER }}/api-service \
            --set productsService.image.repository=ghcr.io/${{ env.OWNER }}/products-service \
            --set authService.image.tag=ci \
            --set apiService.image.tag=ci \
            --set productsService.image.tag=ci

  sbom:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pull auth-service image
        run: docker pull ghcr.io/${{ env.OWNER }}/auth-service:ci

      - name: Pull api-service image
        run: docker pull ghcr.io/${{ env.OWNER }}/api-service:ci

      - name: Pull products-service image
        run: docker pull ghcr.io/${{ env.OWNER }}/products-service:ci

      - name: Generate SBOM for auth-service
        uses: anchore/sbom-action@v0.16.0
        with:
          image: ghcr.io/${{ env.OWNER }}/auth-service:ci
          format: spdx-json
          output-file: auth-service-sbom.spdx.json

      - name: Generate SBOM for api-service
        uses: anchore/sbom-action@v0.16.0
        with:
          image: ghcr.io/${{ env.OWNER }}/api-service:ci
          format: spdx-json
          output-file: api-service-sbom.spdx.json

      - name: Generate SBOM for products-service
        uses: anchore/sbom-action@v0.16.0
        with:
          image: ghcr.io/${{ env.OWNER }}/products-service:ci
          format: spdx-json
          output-file: products-service-sbom.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            auth-service-sbom.spdx.json
            api-service-sbom.spdx.json
            products-service-sbom.spdx.json
