name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install auth-service deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/auth-service/requirements.txt -r services/auth-service/requirements-dev.txt

      - name: Install api-service deps
        run: |
          pip install -r services/api-service/requirements.txt -r services/api-service/requirements-dev.txt

      - name: Run auth-service tests
        run: pytest services/auth-service/tests

      - name: Run api-service tests
        run: pytest services/api-service/tests

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep (fail on invalid rules)
        run: semgrep --config .semgrep.yml --error --strict

  build-images:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          load: true
          tags: auth-service:ci

      - name: Build api-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          load: true
          tags: api-service:ci

  sbom:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          load: true
          tags: auth-service:ci

      - name: Build api-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          load: true
          tags: api-service:ci

      - name: Generate SBOM for auth-service
        uses: anchore/sbom-action@v0.16.0
        with:
          image: auth-service:ci
          format: spdx-json
          output-file: auth-service-sbom.spdx.json

      - name: Generate SBOM for api-service
        uses: anchore/sbom-action@v0.16.0
        with:
          image: api-service:ci
          format: spdx-json
          output-file: api-service-sbom.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            auth-service-sbom.spdx.json
            api-service-sbom.spdx.json