name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  lint-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/lint-test.yml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  sast:
    uses: ./.github/workflows/sast.yml

  dependency-scan:
    needs: [detect-changes, lint-test]
    if: needs.detect-changes.outputs.has_changes == 'true'
    uses: ./.github/workflows/dependency-scan.yml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  helm-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.helm_changed == 'true'
    uses: ./.github/workflows/helm-lint.yml
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

  build-and-scan-images:
    needs: [detect-changes, lint-test, sast, helm-lint, dependency-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          load: true
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Restore Trivy DB cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-${{ runner.os }}

      - name: Scan ${{ matrix.service }} image
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed ${{ matrix.service }}:ci

      - name: Tag image for GHCR
        run: |
          docker tag ${{ matrix.service }}:ci ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

  sign-images:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-scan-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign ${{ matrix.service }} image (keyless)
        run: cosign sign --yes ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

  dast:
    needs: build-and-scan-images
    if: github.event_name == 'push'
    uses: ./.github/workflows/dast.yml
    secrets:
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

  deploy:
    runs-on: ubuntu-latest
    needs: [helm-lint, build-and-scan-images, sign-images, dast]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install secure-pipeline infrastructure/helm/secure-pipeline \
            --set authService.image.repository=ghcr.io/${{ env.OWNER }}/auth-service \
            --set apiService.image.repository=ghcr.io/${{ env.OWNER }}/api-service \
            --set productsService.image.repository=ghcr.io/${{ env.OWNER }}/products-service \
            --set inventoryService.image.repository=ghcr.io/${{ env.OWNER }}/inventory-service \
            --set frontendService.image.repository=ghcr.io/${{ env.OWNER }}/frontend-service \
            --set authService.image.tag=ci \
            --set apiService.image.tag=ci \
            --set productsService.image.tag=ci \
            --set inventoryService.image.tag=ci \
            --set frontendService.image.tag=ci

  sbom:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        service:
        - auth-service
        - api-service
        - products-service
        - inventory-service
        - frontend-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Check if image exists in GHCR
        run: |
          IMAGE="ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci"

          if ! docker manifest inspect $IMAGE > /dev/null 2>&1; then
            echo "Image $IMAGE not found in GHCR - skipping SBOM"
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Pull ${{ matrix.service }} image
        if: env.SKIP == 'false'
        run: docker pull ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

      - name: Generate SBOM for ${{ matrix.service }}
        if: env.SKIP == 'false'
        uses: anchore/sbom-action@v0.16.0
        with:
          image: ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci
          format: spdx-json
          output-file: ${{ matrix.service }}-sbom.spdx.json

      - name: Upload SBOM
        if: env.SKIP == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: ${{ matrix.service }}-sbom.spdx.json
