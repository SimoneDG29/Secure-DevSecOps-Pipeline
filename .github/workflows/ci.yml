name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      helm: ${{ steps.filter.outputs.helm }}
      has_changes: ${{ steps.flag.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            auth-service:
              - 'services/auth-service/**'
            api-service:
              - 'services/api-service/**'
            products-service:
              - 'services/products-service/**'
            inventory-service:
              - 'services/inventory-service/**'
            frontend-service:
              - 'services/frontend-service/**'
            helm:
              - 'infrastructure/helm/**'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          changed=()

          [[ "${{ steps.filter.outputs.auth-service }}" == "true" ]] && changed+=("\"auth-service\"")
          [[ "${{ steps.filter.outputs.api-service }}" == "true" ]] && changed+=("\"api-service\"")
          [[ "${{ steps.filter.outputs.products-service }}" == "true" ]] && changed+=("\"products-service\"")
          [[ "${{ steps.filter.outputs.inventory-service }}" == "true" ]] && changed+=("\"inventory-service\"")
          [[ "${{ steps.filter.outputs.frontend-service }}" == "true" ]] && changed+=("\"frontend-service\"")

          if [ ${#changed[@]} -eq 0 ]; then
            echo 'matrix={"service":[]}' >> $GITHUB_OUTPUT
          else
            joined=$(IFS=,; echo "${changed[*]}")
            echo "matrix={\"service\":[${joined}]}" >> $GITHUB_OUTPUT
          fi

      - name: Set has-changes flag
        id: flag
        run: |
          MATRIX='${{ steps.set-matrix.outputs.matrix }}'

          if [ "$MATRIX" = '{"service":[]}' ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  lint-test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            services/${{ matrix.service }}/requirements.txt
            services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/${{ matrix.service }}/requirements.txt -r services/${{ matrix.service }}/requirements-dev.txt

      - name: Run tests
        run: pytest services/${{ matrix.service }}/tests

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep (fail on invalid rules)
        run: semgrep --config .semgrep.yml --error --strict

  dependency-scan:
    needs: [detect-changes, lint-test]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Restore Trivy cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: |
            trivy-${{ runner.os }}

      - name: Scan service dependencies
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy
        run: |
          trivy fs services/${{ matrix.service }} \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed

  helm-lint:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.helm == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint infrastructure/helm/secure-pipeline

  build-and-scan-images:
    needs: [detect-changes, lint-test, semgrep, helm-lint, dependency-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          load: true
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Restore Trivy DB cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-${{ runner.os }}

      - name: Scan ${{ matrix.service }} image
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed ${{ matrix.service }}:ci

      - name: Tag image for GHCR
        run: |
          docker tag ${{ matrix.service }}:ci ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

  sign-images:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-scan-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign ${{ matrix.service }} image (keyless)
        run: cosign sign --yes ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

  create-secrets:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic products-db-secret \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_PORT=${{ secrets.DB_PORT }} \
            --from-literal=DB_NAME=${{ secrets.DB_NAME }} \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

  zap-dast:
    runs-on: ubuntu-latest
    needs: build-and-scan-images
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Create .env from GitHub Secrets
        run: |
          cat <<EOF > .env
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Start full stack
        run: |
          docker compose --env-file .env up -d --build

      - name: Wait for frontend readiness
        run: |
          for i in {1..40}; do
            if curl -fs http://localhost:5173 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 3
          done

          echo "Frontend not reachable"
          docker compose logs
          exit 1

      - name: Run OWASP ZAP Full Scan (DAST)
        run: |
          set -e

          chmod -R 777 ${{ github.workspace }}

          NETWORK_NAME=$(docker network ls --format '{{.Name}}' | grep default | head -n 1)

          echo "Using Docker network: $NETWORK_NAME"

          docker run --rm \
            --network "$NETWORK_NAME" \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://frontend-service:80 \
            -r zap-report.html \
            -J zap-report.json \
            -l WARN \
            -I \
            -m 5

          echo "Analyzing vulnerabilities (confidence-based policy)..."

          HIGH_CONF_COUNT=$(jq '[.. | objects | select((.confidence? // 0) == 3 and (.riskdesc? | test("High|Critical")))] | length' zap-report.json)
          MED_CONF_COUNT=$(jq '[.. | objects | select((.confidence? // 0) == 2 and (.riskdesc? | test("High|Critical")))] | length' zap-report.json)

          echo "HIGH confidence vulns: $HIGH_CONF_COUNT"
          echo "MEDIUM confidence vulns: $MED_CONF_COUNT"

          if [ "$HIGH_CONF_COUNT" -gt 0 ]; then
            echo "❌ SECURITY FAIL: High confidence High/Critical vulnerabilities found"
            exit 1
          fi

          if [ "$MED_CONF_COUNT" -gt 5 ]; then
            echo "⚠️ SECURITY FAIL: Too many medium confidence vulnerabilities"
            exit 1
          fi

          echo "✅ Security scan passed"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [helm-lint, create-secrets, build-and-scan-images, sign-images, zap-dast]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install secure-pipeline infrastructure/helm/secure-pipeline \
            --set authService.image.repository=ghcr.io/${{ env.OWNER }}/auth-service \
            --set apiService.image.repository=ghcr.io/${{ env.OWNER }}/api-service \
            --set productsService.image.repository=ghcr.io/${{ env.OWNER }}/products-service \
            --set inventoryService.image.repository=ghcr.io/${{ env.OWNER }}/inventory-service \
            --set frontendService.image.repository=ghcr.io/${{ env.OWNER }}/frontend-service \
            --set authService.image.tag=ci \
            --set apiService.image.tag=ci \
            --set productsService.image.tag=ci \
            --set inventoryService.image.tag=ci \
            --set frontendService.image.tag=ci

  sbom:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-scan-images]
    if: github.event_name == 'workflow_dispatch' && needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR owner (lowercase)
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pull ${{ matrix.service }} image
        run: docker pull ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci

      - name: Generate SBOM for ${{ matrix.service }}
        uses: anchore/sbom-action@v0.16.0
        with:
          image: ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:ci
          format: spdx-json
          output-file: ${{ matrix.service }}-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: ${{ matrix.service }}-sbom.spdx.json
