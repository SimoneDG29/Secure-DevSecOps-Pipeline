name: docker-build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          load: true
          tags: auth-service:ci

      - name: Build api-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          load: true
          tags: api-service:ci