name: dependency-scan

on:
  workflow_call:
    inputs:
      matrix:
        description: "JSON matrix of services to scan"
        required: true
        type: string

jobs:
  trivy-fs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Trivy cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Scan service dependencies
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_CACHE_DIR: ~/.cache/trivy
        with:
          scan-type: fs
          scan-ref: ./services/${{ matrix.service }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln