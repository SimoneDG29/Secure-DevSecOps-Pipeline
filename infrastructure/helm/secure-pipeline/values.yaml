authService:
  replicaCount: 1
  image:
    repository: ghcr.io/your-username/auth-service
    tag: ci
    pullPolicy: IfNotPresent
  service:
    port: 5001
  probes:
    readiness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 15
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

apiService:
  replicaCount: 1
  image:
    repository: ghcr.io/your-username/api-service
    tag: ci
    pullPolicy: IfNotPresent
  service:
    port: 5002
  probes:
    readiness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 15
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"