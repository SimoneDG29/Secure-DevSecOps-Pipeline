authService:
  replicaCount: 1
  image:
    repository: ghcr.io/auth-service
    tag: ci
    pullPolicy: IfNotPresent
  service:
    port: 5001
  secretRef:
    name: products-db-secret
  probes:
    readiness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 15
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

