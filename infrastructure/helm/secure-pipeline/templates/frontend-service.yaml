apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend-service
  labels:
    app: frontend-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.frontendService.replicaCount }}
  selector:
    matchLabels:
      app: frontend-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: frontend-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: frontend-service
          image: "{{ .Values.frontendService.image.repository }}:{{ .Values.frontendService.image.tag }}"
          imagePullPolicy: {{ .Values.frontendService.image.pullPolicy }}
          securityContext:
            runAsNonRoot: {{ .Values.frontendService.securityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.frontendService.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.frontendService.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: {{ .Values.frontendService.probes.readiness.path }}
              port: {{ .Values.frontendService.service.port }}
            initialDelaySeconds: {{ .Values.frontendService.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontendService.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.frontendService.probes.liveness.path }}
              port: {{ .Values.frontendService.service.port }}
            initialDelaySeconds: {{ .Values.frontendService.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontendService.probes.liveness.periodSeconds }}
          ports:
            - containerPort: {{ .Values.frontendService.service.port }}
          resources:
            requests:
              cpu: {{ .Values.frontendService.resources.requests.cpu | quote }}
              memory: {{ .Values.frontendService.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.frontendService.resources.limits.cpu | quote }}
              memory: {{ .Values.frontendService.resources.limits.memory | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-service
  labels:
    app: frontend-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app: frontend-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.frontendService.service.port }}
      targetPort: {{ .Values.frontendService.service.port }}
  type: ClusterIP